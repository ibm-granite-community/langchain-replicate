# GitHub Dependabot configuration file
version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directories:
    - "/"
    - "/.github/actions"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
  # Maintain dependencies for python
  - package-ecosystem: "pip"
    directories:
    - "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
